<!-- นำเข้า Firebase SDK (เวอร์ชัน Compat เพื่อให้เข้ากับโค้ดโครงสร้างเดิม) -->
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
  // 1. ตั้งค่า Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyCTrlAOISCyx7pOvtr1xKRyKwG-LmVI0HQ",
    authDomain: "spervks.firebaseapp.com",
    projectId: "spervks",
    storageBucket: "spervks.firebasestorage.app",
    messagingSenderId: "550022383315",
    appId: "1:550022383315:web:8da32f4bfad4de14ea3626"
  };

  // เริ่มต้นใช้งาน Firebase และ Firestore
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const collectionName = "supervisor_reports"; // ชื่อ Collection ที่จะเก็บข้อมูล

  var allData = [];
  var dashboardChart = null;

  $(document).ready(function() { 
    showDashboard(); 
    loadTableData(); 
    fetchDropdowns(); 
    $('#filterDataSelect').select2({ theme: 'bootstrap-5', width: '100%', placeholder: 'พิมพ์ค้นหาหรือเลือกข้อมูล...' });
  });

  // 2. ดึงข้อมูล Dropdown (สามารถย้ายไปเก็บใน Firestore Collection 'settings' ในอนาคตได้)
  async function fetchDropdowns() {
    try {
      // ตัวอย่างข้อมูลจำลองชั่วคราว คุณสามารถนำไปสร้างเป็น Document ใน Firestore เพื่อให้แก้ไขง่ายขึ้นได้
      let data = {
        supervisors: ["พยาบาล A", "พยาบาล B", "พยาบาล C"],
        positions: ['พยาบาลวิชาชีพชำนาญการ', 'พยาบาลวิชาชีพปฏิบัติการ'],
        doctors: ["นพ. A", "พญ. B"],
        nurses: ["พย. 1", "พย. 2", "พย. 3"],
        helpers: ["ผช. 1", "ผช. 2"]
      };
      
      createOpts('supList', data.supervisors); 
      createOpts('posList', data.positions); 
      createOpts('docList1', data.doctors); 
      createOpts('docList2', data.doctors); 
      fillCls('nurse-list', data.nurses); 
      fillCls('helper-list', data.helpers); 

      $('.select2-input').select2({ theme: 'bootstrap-5', width: '100%' });
    } catch(e) { console.log(e); }
  }
  
  function createOpts(id, list) { 
    let s = document.getElementById(id); 
    if(s && list && list.length > 0) { 
      s.innerHTML = '<option value="" disabled selected>เลือก...</option>'; 
      list.forEach(v => s.add(new Option(v, v))); 
    }
  }

  function fillCls(cName, list) {
    let els = document.getElementsByClassName(cName);
    if(list && list.length > 0) {
      for(let i=0; i<els.length; i++) {
        els[i].innerHTML = '<option value="" selected>เลือก...</option>';
        list.forEach(v => els[i].add(new Option(v, v)));
      }
    }
  }

  function showDashboard() { hideAll(); $('#dashboardSection').show(); $('#btnTabDash').addClass('active'); updateDashboardCards(); renderChart(); window.scrollTo(0,0); }
  function showForm() { hideAll(); $('#formSection').show(); $('#btnTabForm').addClass('active'); resizeCanvas(); window.scrollTo(0,0); }
  function showTable() { hideAll(); $('#tableSection').show(); $('#btnTabTable').addClass('active'); loadTableData(); window.scrollTo(0,0); }
  function showHandout() { hideAll(); $('#handoutSection').show(); $('#btnTabHandout').addClass('active'); window.scrollTo(0,0); }
  
  function hideAll() { $('#dashboardSection, #formSection, #tableSection, #handoutSection').hide(); $('.nav-link').removeClass('active'); }
  
  function resetForm() { document.getElementById('mainForm').reset(); $('#recId').val(''); $('.select2-input').val('').trigger('change'); clearSignature(); }

  function getShiftOrder(shiftName) {
      if(shiftName === 'ดึก') return 1;
      if(shiftName === 'เช้า') return 2;
      if(shiftName === 'บ่าย') return 3;
      return 99;
  }

  function formatDate(d) { 
    if(!d) return ''; 
    var dt=new Date(d); 
    return dt.getFullYear()+'-'+('0'+(dt.getMonth()+1)).slice(-2)+'-'+('0'+dt.getDate()).slice(-2); 
  }

  function parseDateSafe(dateString) {
      if(!dateString) return new Date();
      if(String(dateString).includes('1899')) return new Date(); 
      let parsed = new Date(dateString);
      return isNaN(parsed.getTime()) ? new Date() : parsed;
  }

  function formatThaiDateCE(dateString) {
      if(!dateString) return '';
      const d = parseDateSafe(dateString);
      if(isNaN(d.getTime())) return dateString;
      const months = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
      return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
  }

  // 3. บันทึกข้อมูลลง Firestore
  async function handleFormSubmit(e) {
    e.preventDefault(); 
    $('#loadingOverlay').css('display', 'flex');
    
    let fd = {}; 
    new FormData(e.target).forEach((v, k) => fd[k] = v);

    if(fd.Shift === "ดึก") { fd.StartTime = "00:30"; fd.EndTime = "08:30"; }
    else if(fd.Shift === "เช้า") { fd.StartTime = "08:30"; fd.EndTime = "16:30"; }
    else { fd.StartTime = "16:30"; fd.EndTime = "00:30"; }
    
    $('#c_date').text(fd.ReportDate);
    $('#c_time').text(`เวร${fd.Shift} (${fd.StartTime} - ${fd.EndTime} น.)`);
    $('#c_sup').text(fd.SupervisorName || '-'); $('#c_pos').text(fd.Position || '-');
    $('#c_docER').text(fd.DoctorER || '-'); $('#c_docWard').text(fd.DoctorWard || '-');
    $('#c_stat_er').text(fd.StatER_Total || '0'); $('#c_stat_ipd3').text(fd.StatIPD3_Remain || '0');
    $('#c_ref_sum').text(fd.Refer_Total || '0'); $('#c_prob_det').text(fd.Problem_Detail || '-');

    if (!isCanvasBlank(canvas)) $('#c_sig_img').attr('src', canvas.toDataURL()).show(); else $('#c_sig_img').hide();

    await new Promise(r => setTimeout(r, 500));
    let capDiv = document.getElementById('captureArea');
    capDiv.style.zIndex = '1000'; 

    let capCanvas = await html2canvas(capDiv, { scale: 1.5, useCORS: true });
    let imageBase64 = capCanvas.toDataURL("image/png");

    let pdfOpt = { margin: 0.5, filename: 'Report.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } };
    let pdfBase64 = await html2pdf().set(pdfOpt).from(capDiv).outputPdf('datauristring');
    
    capDiv.style.zIndex = '-1';

    // เพิ่ม Timestamp สำหรับการเรียงลำดับใน Firestore
    fd.timestamp = firebase.firestore.FieldValue.serverTimestamp();
    fd.imageBase64 = imageBase64;
    fd.pdfBase64 = pdfBase64;

    try {
      if(fd.recId) {
        // กรณีแก้ไขข้อมูล
        await db.collection(collectionName).doc(fd.recId).update(fd);
      } else {
        // กรณีเพิ่มข้อมูลใหม่
        await db.collection(collectionName).add(fd);
      }
      $('#loadingOverlay').hide();
      Swal.fire('สำเร็จ', 'บันทึกข้อมูลเรียบร้อย', 'success'); 
      resetForm(); 
      showTable();
    } catch (error) {
      $('#loadingOverlay').hide();
      console.error("Error writing document: ", error);
      Swal.fire('Error', 'ไม่สามารถบันทึกข้อมูลได้ กรุณาตรวจสอบสิทธิ์ของ Database', 'error'); 
    }
  }

  // 4. ดึงข้อมูลประวัติจาก Firestore
  async function loadTableData() {
    try {
      let snapshot = await db.collection(collectionName).orderBy("ReportDate", "desc").get();
      allData = [];
      
      snapshot.forEach(doc => {
        let data = doc.data();
        data.id = doc.id;
        allData.push(data);
      });

      let tbody = $('#dataTable tbody').empty();
      if(allData.length === 0) tbody.append('<tr><td colspan="5" class="text-center text-muted">ไม่พบประวัติ</td></tr>'); 
      
      allData.forEach(r => {
        let shiftVal = r.Shift || "-";
        let order = getShiftOrder(shiftVal);
        let ts = parseDateSafe(r.ReportDate).getTime(); 
        let formattedDate = formatThaiDateCE(r.ReportDate);

        let pdfLink = r.pdfBase64 ? `<a href="${r.pdfBase64}" download="Report_${r.ReportDate}.pdf" class="btn btn-sm btn-outline-danger me-1">PDF</a>` : '';
        let imgLink = r.imageBase64 ? `<a href="${r.imageBase64}" download="Report_${r.ReportDate}.png" class="btn btn-sm btn-outline-primary">รูป</a>` : '';
        
        tbody.append(`<tr>
          <td data-order="${ts}">${formattedDate}</td>
          <td data-order="${order}"><span class="badge bg-info">เวร${shiftVal}</span></td>
          <td>${r.SupervisorName || '-'}</td>
          <td class="text-center">${pdfLink}${imgLink}</td>
          <td class="text-end text-nowrap">
            <button class="btn btn-sm btn-warning me-1" onclick="editRec('${r.id}')"><i class="fas fa-pen"></i></button>
            <button class="btn btn-sm btn-danger" onclick="deleteRec('${r.id}')"><i class="fas fa-trash"></i></button>
          </td>
        </tr>`);
      });

      if ($.fn.DataTable.isDataTable('#dataTable')) $('#dataTable').DataTable().destroy();
      $('#dataTable').DataTable({ order: [[0, 'desc'], [1, 'asc']], responsive: true });
      updateDashboardCards(); 
      renderChart();
    } catch(e) { 
      console.error("Table load error", e); 
    }
  }

  function editRec(id) {
    var record = allData.find(r => r.id == id); 
    if (!record) return;
    
    resetForm(); 
    var f = document.forms['mainForm'];
    
    $('#recId').val(record.id); 
    f['ReportDate'].value = formatDate(record.ReportDate); 
    f['Shift'].value = record.Shift;
    
    f['SupervisorName'].value = record.SupervisorName;
    f['Position'].value = record.Position;
    f['DoctorER'].value = record.DoctorER;
    f['DoctorWard'].value = record.DoctorWard;
    
    f['NurseER1'].value = record.NurseER1;
    f['NurseER2'].value = record.NurseER2;
    f['NurseER3'].value = record.NurseER3;
    f['NurseER4'].value = record.NurseER4;
    f['EMT'].value = record.EMT;
    f['HelperER'].value = record.HelperER;
    
    f['StatER_Total'].value = record.StatER_Total; 
    f['StatIPD3_Remain'].value = record.StatIPD3_Remain; 
    f['Refer_Total'].value = record.Refer_Total; 
    f['Problem_Detail'].value = record.Problem_Detail;

    $('.select2-input').trigger('change');
    
    showForm(); 
    Swal.fire({ title: 'โหมดแก้ไขข้อมูล', icon: 'info', timer: 2000, showConfirmButton: false });
  }

  function applyCustomSort() { $('#dataTable').DataTable().order([[0, $('#sortOrderSelect').val()], [1, 'asc']]).draw(); }
  
  // 5. ลบข้อมูลใน Firestore
  function deleteRec(id) { 
    Swal.fire({title:'ลบข้อมูลนี้?', icon:'warning', showCancelButton:true}).then(r=>{ 
      if(r.isConfirmed){ 
        $('#loadingOverlay').css('display', 'flex'); 
        db.collection(collectionName).doc(id).delete().then(() => {
          Swal.fire('ลบสำเร็จ', '', 'success');
          loadTableData();
        }).catch(err => {
          console.error(err);
          Swal.fire('Error', 'ไม่สามารถลบได้', 'error');
        }).finally(() => $('#loadingOverlay').hide()); 
      }
    }); 
  }

  // 6. อัปเดตข้อมูล Dashboard จาก Object ของ Firestore โดยตรง
  function updateDashboardCards() {
    if(!allData || allData.length === 0) return;
    let sortedData = [...allData].sort((a, b) => new Date(b.ReportDate) - new Date(a.ReportDate));
    let latest = sortedData[0];
    
    let today = new Date();
    $('#dash_date').text(today.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' }));
    $('#dash_refer').text(latest.Refer_Total || '0');
    
    let ipdTotal = Number(latest.StatIPD3_Remain) || 0; 
    $('#dash_ipd').text(ipdTotal);
    $('#dash_er').text(latest.StatER_Total || '0');
  }

  // 7. จัดการระบบกราฟให้รองรับโครงสร้าง Object ของ Firestore
  function renderChart() {
    if(!allData || allData.length === 0) return;
    let startDate = $('#filterStartDate').val(); let endDate = $('#filterEndDate').val();
    let selectedTypes = $('#filterDataSelect').val() || []; let chartType = $('#filterChartType').val();

    if (selectedTypes.length === 0) { if (dashboardChart) dashboardChart.destroy(); $('#dashTable tbody, #dashTable thead tr').empty(); return; }

    let filteredData = allData.filter(r => {
      let rDate = new Date(r.ReportDate); rDate.setHours(0,0,0,0);
      return (startDate ? rDate >= new Date(startDate) : true) && (endDate ? rDate <= new Date(endDate) : true);
    });

    let timeSeriesTypes = ['er_total', 'refer_total', 'ipd_total'];
    let countTypes = ['supervisor_count', 'doc_er_count', 'problem_count', 'all_staff_count'];
    let isTimeMode = selectedTypes.some(t => timeSeriesTypes.includes(t));
    let isCountMode = selectedTypes.some(t => countTypes.includes(t));

    let labels = []; let datasets = []; const getOptionText = (val) => $(`#filterDataSelect option[value='${val}']`).text();

    if (isTimeMode) {
      filteredData.sort((a, b) => new Date(a.ReportDate) - new Date(b.ReportDate));
      labels = [...new Set(filteredData.map(r => r.ReportDate))];
      let colors = ['#1e3c72', '#ff9966', '#11998e'];
      selectedTypes.filter(t => timeSeriesTypes.includes(t)).forEach((type, index) => {
        let dataPoints = labels.map(lbl => {
          let sum = 0;
          filteredData.filter(r => r.ReportDate === lbl).forEach(r => {
            if(type === 'er_total') sum += Number(r.StatER_Total) || 0;
            if(type === 'refer_total') sum += Number(r.Refer_Total) || 0;
            if(type === 'ipd_total') sum += Number(r.StatIPD3_Remain) || 0;
          });
          return sum;
        });
        datasets.push({ label: getOptionText(type), data: dataPoints, backgroundColor: chartType === 'line' ? colors[index % colors.length] + '33' : colors[index % colors.length], borderColor: colors[index % colors.length], borderWidth: 1, fill: chartType === 'line' });
      });
    } else if (isCountMode) {
      let counts = {};
      filteredData.forEach(r => {
        let items = [];
        if(selectedTypes.includes('supervisor_count')) items.push(r.SupervisorName);
        if(selectedTypes.includes('doc_er_count')) items.push(r.DoctorER);
        if(selectedTypes.includes('problem_count')) { 
            if(r.Problem_Detail && r.Problem_Detail.trim() !== "") items.push("พบปัญหา"); 
        }
        if(selectedTypes.includes('all_staff_count')) { 
            [r.NurseER1, r.NurseER2, r.NurseER3, r.NurseER4, r.EMT, r.HelperER].forEach(staff => {
                if(staff) items.push(staff);
            }); 
        }
        items.forEach(item => { if(item && item.trim() !== '' && item.trim() !== '-') counts[item] = (counts[item] || 0) + 1; });
      });
      let sortedCounts = Object.keys(counts).map(k => ({name: k, count: counts[k]})).sort((a,b) => b.count - a.count);
      sortedCounts.forEach(c => { labels.push(c.name); datasets.push(c.count); });
      let dataPoints = sortedCounts.map(c => c.count);
      datasets = [{ label: "จำนวน/ความถี่ (ครั้ง)", data: dataPoints, backgroundColor: chartType === 'pie' ? ['#1e3c72', '#ff9966', '#7F00FF', '#11998e', '#f1c40f', '#e74c3c', '#3498db', '#9b59b6', '#34495e', '#16a085'] : 'rgba(111, 66, 193, 0.7)', borderColor: chartType === 'pie' ? '#fff' : '#6f42c1', borderWidth: 1 }];
    }

    if(chartType === 'table') {
      $('#mainDashboardChart').hide(); $('#dashboardTableArea').show();
      let tbody = $('#dashTable tbody').empty(); let thead = $('#dashTable thead tr').empty();
      if (isTimeMode) {
        thead.append('<th>วันที่</th>'); datasets.forEach(ds => thead.append(`<th class="text-end">${ds.label}</th>`));
        if(labels.length === 0) tbody.append(`<tr><td colspan="${datasets.length+1}" class="text-center">ไม่มีข้อมูล</td></tr>`);
        else labels.forEach((lbl, i) => { let tr = `<tr><td>${formatThaiDateCE(lbl)}</td>`; datasets.forEach(ds => tr += `<td class="text-end fw-bold text-primary">${ds.data[i]}</td>`); tr += `</tr>`; tbody.append(tr); });
      } else if (isCountMode) {
        thead.append('<th>รายชื่อ/รายการ</th><th class="text-end">ความถี่ (ครั้ง)</th>');
        if(labels.length === 0) tbody.append(`<tr><td colspan="2" class="text-center">ไม่มีข้อมูล</td></tr>`);
        else labels.forEach((lbl, i) => { tbody.append(`<tr><td>${lbl}</td><td class="text-end fw-bold text-primary">${datasets[0].data[i]}</td></tr>`); });
      }
      return;
    }

    $('#dashboardTableArea').hide(); $('#mainDashboardChart').show();
    if (dashboardChart) { dashboardChart.destroy(); }
    let ctx = document.getElementById('mainDashboardChart').getContext('2d');
    dashboardChart = new Chart(ctx, { type: chartType, data: { labels: labels, datasets: datasets }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: chartType === 'pie' || chartType === 'line' || datasets.length > 1 } }, scales: chartType === 'pie' ? {} : { y: { beginAtZero: true, ticks: { precision: 0 } } } } });
  }

  function exportDashboardPDF() {
    var element = document.getElementById('pdfDashboardArea');
    var opt = { margin: 0.5, filename: 'Dashboard_KSH_SUPERVISOR.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' } };
    $('#loadingOverlay').css('display', 'flex'); html2pdf().set(opt).from(element).save().then(() => { $('#loadingOverlay').fadeOut(); });
  }

  var canvas = document.getElementById('signaturePad'), ctx = canvas.getContext('2d'), drawing = false;
  function resizeCanvas() { var ratio = Math.max(window.devicePixelRatio || 1, 1); canvas.width = canvas.offsetWidth * ratio; canvas.height = canvas.offsetHeight * ratio; ctx.scale(ratio, ratio); ctx.lineWidth = 2.5; ctx.strokeStyle = "#000080"; ctx.lineCap = "round"; }
  window.addEventListener("resize", resizeCanvas);
  function getMousePos(canvas, evt) { var rect = canvas.getBoundingClientRect(); return { x: (evt.clientX || evt.touches[0].clientX) - rect.left, y: (evt.clientY || evt.touches[0].clientY) - rect.top }; }
  function startDrawing(e) { drawing = true; var pos = getMousePos(canvas, e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); e.preventDefault(); }
  function draw(e) { if (!drawing) return; var pos = getMousePos(canvas, e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); e.preventDefault(); }
  function stopDrawing(e) { drawing = false; ctx.closePath(); }
  canvas.addEventListener('mousedown', startDrawing); canvas.addEventListener('mousemove', draw); canvas.addEventListener('mouseup', stopDrawing); canvas.addEventListener('mouseout', stopDrawing);
  canvas.addEventListener('touchstart', startDrawing, {passive: false}); canvas.addEventListener('touchmove', draw, {passive: false}); canvas.addEventListener('touchend', stopDrawing);
  function clearSignature() { ctx.clearRect(0,0,canvas.width,canvas.height); }
  function isCanvasBlank(c) { var b = document.createElement('canvas'); b.width = c.width; b.height = c.height; return c.toDataURL() === b.toDataURL(); }
</script>
</body>
</html>
